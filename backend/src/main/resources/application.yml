server:
  port: 8088

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hotel_booking?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ab123168
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-delete-value: "NOW()"
      logic-not-delete-value: "NULL"

# JWT
jwt:
  secret: HotelBookingSystemSecretKeyForJWTTokenGeneration2024VeryLongSecretKey
  expiration: 86400000

# 文件上传
file:
  upload-dir: uploads/
  max-size: 10MB

logging:
  level:
    com.hotel: debug
